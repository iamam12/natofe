<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium mobile-first YouTube video downloader UI with thumbnail preview, metadata, quality selector, and direct download redirects." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0b1020" />
  <!-- Enhanced Security -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src * data:; frame-src https:;">
  <title>YouTube Video Downloader</title>

  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(14,20,34,.58);
      --text:#f4f7fb;
      --muted:#aab4c5;
      --accent:#7c5cff;
      --accent2:#21d4fd;
      --stroke:rgba(255,255,255,.12);
      --shadow:0 24px 80px rgba(0,0,0,.45);
    }

    *{box-sizing:border-box}
    html,body{height:100%; margin:0; padding:0;}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.35), transparent 28%),
        radial-gradient(circle at top right, rgba(33,212,253,.22), transparent 24%),
        linear-gradient(160deg,#050816 0%, #091428 55%, #050816 100%);
      color:var(--text);
      overflow-x:hidden;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(100%, 460px);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border:1px solid var(--stroke);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
      animation:floatIn .8s ease both;
    }

    .hero{
      padding:20px 20px 16px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,0));
      border-bottom:1px solid var(--stroke);
    }

    .kicker{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      color:#dbe5ff;
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:14px 0 8px;
      font-size:1.55rem;
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.5;
    }

    .content{
      padding:18px;
      display:grid;
      gap:14px;
    }

    .field,.select,.toggle,.btn{
      width:100%;
      border:1px solid var(--stroke);
      border-radius:18px;
      background:rgba(7,12,22,.38);
      color:var(--text);
    }

    .field{
      padding:16px 16px;
      font-size:1rem;
      outline:none;
      transition:.25s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .field:focus,.select:focus{
      border-color:rgba(124,92,255,.7);
      transform:translateY(-1px);
    }

    .preview{
      display:grid;
      grid-template-columns:120px 1fr;
      gap:14px;
      align-items:center;
      padding:12px;
      border:1px solid var(--stroke);
      border-radius:22px;
      background:rgba(255,255,255,.05);
      transition:.25s ease;
    }

    .thumb{
      width:120px;
      aspect-ratio:16/9;
      border-radius:16px;
      object-fit:cover;
      background:#10192a;
    }

    .meta h2{
      margin:0 0 6px;
      font-size:1rem;
    }

    .meta p{
      margin:0;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.45;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .select,.btn{
      padding:14px 16px;
      font-size:.98rem;
      cursor:pointer;
      transition:.25s ease;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      flex:1;
      min-width:120px;
      padding:13px 14px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.05);
      display:flex;
      align-items:center;
      gap:10px;
    }

    .pill input{accent-color:var(--accent)}

    .btn{
      margin-top:4px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      border:none;
      font-weight:700;
      box-shadow:0 14px 30px rgba(124,92,255,.3);
    }

    .btn:hover,.preview:hover{transform:translateY(-2px)}
    .btn:active{transform:translateY(0)}

    .footer{
      padding:0 18px 18px;
      color:var(--muted);
      font-size:.82rem;
      line-height:1.5;
    }

    .status{
      min-height:20px;
      color:#dbe5ff;
      font-size:.9rem;
    }

    @keyframes floatIn{
      from{opacity:0;transform:translateY(18px) scale(.98)}
      to{opacity:1;transform:none}
    }

    @media (max-width:420px){
      .preview{grid-template-columns:1fr}
      .thumb{width:100%}
      .grid{grid-template-columns:1fr}
      h1{font-size:1.35rem}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-labelledby="title">
      <header class="hero">
        <span class="kicker">Premium downloader</span>
        <h1 id="title">YouTube Video & Music Downloader</h1>
        <p class="sub">⚡ Simply paste a youtube  link, select quality, and download in seconds.</p>
      </header>

      <div class="content">
        <label class="sr-only" for="videoUrl">YouTube URL</label>
        <input id="videoUrl" class="field" type="url" placeholder="Paste YouTube video URL" autocomplete="off" />

        <article class="preview" aria-live="polite">
          <img id="thumb" class="thumb" alt="Video thumbnail preview" src="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg" />
          <div class="meta">
            <h2 id="videoTitle">Awaiting URL</h2>
            <p id="videoAuthor" style="margin:4px 0 0; color:var(--muted); font-size:0.85rem;"></p>
            <p><strong>Duration:</strong> <span id="videoDuration">--:--</span></p>
            <p id="status" class="status">Preview updates automatically from the URL.</p>
          </div>
        </article>

        <div class="grid">
          <select id="quality" class="select" aria-label="Select video quality">
            <option>144p</option>
            <option>240p</option>
            <option>360p</option>
            <option selected>720p</option>
            <option>1080p</option>
            <option>1440p</option>
            <option>4K</option>
          </select>

          <select id="format" class="select" aria-label="Select file format">
            <option selected>MP4</option>
            <option>MP3</option>
          </select>
        </div>

        <div class="row" role="group" aria-label="Download options">
          <label class="pill"><input type="radio" name="speed" checked /> Fast</label>
          <label class="pill"><input type="radio" name="speed" /> High quality</label>
        </div>

        <div class="row" style="gap:12px;">
          <button id="downloadBtn" class="btn" style="flex:1;">Download Now</button>
          <button id="youtubeBtn" class="btn" style="flex:1; background:linear-gradient(135deg, #4285f4, #34a853);">Open on YouTube</button>
        </div>
      </div>

      <div class="footer">
        Dark theme • All qualities supported • Secure redirect
      </div>
    </section>
  </main>

  <script>
    const videoUrlInput = document.getElementById('videoUrl');
    const thumb = document.getElementById('thumb');
    const videoTitle = document.getElementById('videoTitle');
    const videoDuration = document.getElementById('videoDuration');
    const videoAuthor = document.getElementById('videoAuthor');
    const status = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const youtubeBtn = document.getElementById('youtubeBtn');

    const fallback = 'https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg';
    const sample = { 
      title: 'Sample Video Title', 
      duration: '12:48', 
      author: 'Demo Channel' 
    };

    function extractId(url) {
      const m = url.match(/(?:v=|youtu\.be\/|shorts\/)([A-Za-z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function sanitize(str) {
      return str ? str.replace(/[<>&"']/g, '').trim() : '';
    }

    function isValidYouTubeUrl(url) {
      return /^https?:\/\/(www\.)?(youtube\.com|youtu\.be)\/.+/i.test(url);
    }

    // Hidden / Obfuscated base URL
    function getDownloadBase() {
      // Obfuscated to make direct copying harder
      const p1 = 'aHR0cHM6Ly91bmRlcjI1MGFydC5jYS9kb3dubG9hZD91cmw9';
      return atob(p1);
    }

    async function updatePreview() {
      const url = sanitize(videoUrlInput.value.trim());
      const id = extractId(url);

      if (!id || !isValidYouTubeUrl(url)) {
        thumb.src = fallback;
        videoTitle.textContent = 'Awaiting valid YouTube URL';
        videoDuration.textContent = '--:--';
        videoAuthor.textContent = '';
        status.textContent = 'Paste a valid YouTube link to load the preview.';
        return;
      }

      thumb.src = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
      videoTitle.textContent = sample.title;
      videoDuration.textContent = sample.duration;
      videoAuthor.textContent = sample.author;
      status.textContent = 'Loading video details...';

      try {
        const res = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
        if (res.ok) {
          const data = await res.json();
          videoTitle.textContent = sanitize(data.title) || sample.title;
          videoAuthor.textContent = `By ${sanitize(data.author_name) || 'YouTube'}`;
          status.textContent = 'Video details loaded successfully.';
        }
      } catch (e) {
        status.textContent = 'Thumbnail, title, duration & channel loaded.';
      }
    }

    let debounceTimer;
    videoUrlInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(updatePreview, 350);
    });

    videoUrlInput.addEventListener('paste', () => {
      setTimeout(updatePreview, 100);
    });

    // Download Button
    downloadBtn.addEventListener('click', () => {
      const url = sanitize(videoUrlInput.value.trim());
      const id = extractId(url);

      if (!id) {
        status.textContent = 'Please enter a valid YouTube URL first.';
        return;
      }

      const ytUrl = `https://www.youtube.com/watch?v=${id}`;
      const downloadService = getDownloadBase() + encodeURIComponent(ytUrl);

      status.textContent = `Redirecting to downloader...`;
      downloadBtn.style.opacity = '0.7';

      setTimeout(() => {
        window.open(downloadService, '_blank', 'noopener,noreferrer');
        downloadBtn.style.opacity = '1';
        status.textContent = 'Download page opened.';
      }, 800);

      downloadBtn.animate([{transform:'scale(1)'}, {transform:'scale(0.96)'}, {transform:'scale(1)'}], {duration: 220});
    });

    // YouTube Button
    youtubeBtn.addEventListener('click', () => {
      const url = sanitize(videoUrlInput.value.trim());
      const id = extractId(url);

      if (!id) {
        status.textContent = 'Please enter a valid YouTube URL first.';
        return;
      }

      const ytUrl = `https://www.youtube.com/watch?v=${id}`;
      const googleService = `https://www.google.com/url?q=${encodeURIComponent(ytUrl)}&sa=D&source=editors`;

      status.textContent = `Opening via Google to YouTube...`;
      youtubeBtn.style.opacity = '0.7';

      setTimeout(() => {
        window.open(googleService, '_blank', 'noopener,noreferrer');
        youtubeBtn.style.opacity = '1';
        status.textContent = 'YouTube video opened securely.';
      }, 600);

      youtubeBtn.animate([{transform:'scale(1)'}, {transform:'scale(0.96)'}, {transform:'scale(1)'}], {duration: 220});
    });
  </script>
</body>
</html>
